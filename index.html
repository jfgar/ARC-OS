<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Protocolo Architect: Master</title>
    <style>
        :root { 
            --neon-blue: #00d4ff; 
            --neon-pink: #ff007f; 
            --space-dark: #050a14; 
            --hacker-green: #00ff41; 
            --alert: #ff3e3e; 
            --rank-color: #00ff41;
        }
        body { font-family: 'Courier New', monospace; background: var(--space-dark); color: white; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; overflow: hidden; }
        
        #code-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.15; pointer-events: none; }

        #game { 
            display: none;
            background: rgba(10, 15, 26, 0.95); 
            width: 90%; max-width: 400px; padding: 20px; 
            border-radius: 20px; border: 3px solid var(--rank-color); 
            position: relative; z-index: 10; text-align: center;
            box-shadow: 0 0 20px rgba(0, 255, 65, 0.1);
        }
        
        #hud { display: flex; justify-content: space-between; margin-bottom: 15px; color: var(--rank-color); font-size: 0.8rem; font-weight: bold; }
        
        #construction-area { 
            height: 140px; background: #000; border-radius: 15px; 
            margin-bottom: 20px; display: flex; align-items: center; 
            justify-content: center; position: relative; overflow: hidden;
            border: 1px solid var(--rank-color);
        }
        
        #house-display { font-size: 4rem; z-index: 5; transition: transform 0.3s; }

        .overlay-screen { position: fixed; inset: 0; background: var(--space-dark); z-index: 100; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 30px; text-align: center; }
        
        #unlock-screen {
            display: none;
            background: radial-gradient(circle, rgba(0,212,255,0.2) 0%, rgba(5,10,20,1) 70%);
            z-index: 300;
        }

        .unlock-anim {
            font-size: 6rem;
            margin: 20px;
            animation: pulse 1s infinite alternate;
            filter: drop-shadow(0 0 20px var(--neon-blue));
        }

        @keyframes pulse { from { transform: scale(1); } to { transform: scale(1.2); } }

        #error-screen {
            background: rgba(150, 0, 0, 0.95);
            color: white;
            z-index: 200;
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: fixed;
            inset: 0;
        }

        #timer-bar { width: 100%; height: 8px; background: #1e293b; border-radius: 10px; margin-bottom: 15px; overflow: hidden; }
        #timer-fill { height: 100%; background: var(--neon-pink); width: 100%; box-shadow: 0 0 10px var(--neon-pink); }
        
        #prob { font-size: 3.5rem; font-weight: 900; color: var(--hacker-green); margin: 5px 0; text-shadow: 0 0 10px var(--hacker-green); }
        
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 10px; }
        .btn { 
            padding: 20px 5px; font-size: 1.8rem; border: none; border-radius: 12px; 
            background: #111827; color: var(--hacker-green); cursor: pointer; 
            border: 1px solid #1e293b; font-family: 'Courier New', monospace;
            transition: 0.2s;
        }

        .correct-sabotage { background: #064e3b !important; border-color: var(--hacker-green) !important; color: white; }
        
        .action-btn { padding: 15px 40px; background: var(--hacker-green); color: black; font-weight: bold; border: none; border-radius: 8px; font-size: 1.2rem; cursor: pointer; box-shadow: 0 0 15px var(--hacker-green); margin-top: 20px; text-transform: uppercase; }
        
        .stat-box { margin: 15px 0; color: white; border: 1px solid #1e293b; padding: 15px; border-radius: 10px; background: rgba(255,255,255,0.05); width: 250px; }
        
        #collection { display: flex; gap: 5px; justify-content: center; margin-top: 10px; flex-wrap: wrap; }
        .item { width: 35px; height: 35px; background: #1e293b; border-radius: 5px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.2; filter: grayscale(1); }
        .item.unlocked { opacity: 1; filter: grayscale(0); border: 1px solid var(--hacker-green); box-shadow: 0 0 5px var(--hacker-green); }

        .lang-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; width: 100%; max-width: 300px; }
        .lang-btn { background: #111827; border: 1px solid var(--hacker-green); color: white; padding: 15px; border-radius: 8px; cursor: pointer; font-size: 1rem; font-family: 'Courier New', monospace; transition: 0.3s; }
        .lang-btn:hover { background: var(--hacker-green); color: black; }
    </style>
</head>
<body>

    <canvas id="code-bg"></canvas>

    <!-- 1. PANTALLA DE IDIOMA -->
    <div id="lang-screen" class="overlay-screen">
        <h2 style="color: var(--hacker-green); letter-spacing: 2px;">SELECT INTERFACE</h2>
        <div class="lang-grid">
            <button class="lang-btn" onclick="setLang('es')">ESPAÑOL</button>
            <button class="lang-btn" onclick="setLang('en')">ENGLISH</button>
        </div>
    </div>

    <!-- 2. PANTALLA DE INICIO (OCULTA HASTA ELEGIR IDIOMA) -->
    <div id="start-screen" class="overlay-screen" style="display: none;">
        <h1 style="color: var(--hacker-green); letter-spacing: 4px;">ARCHITECT OS</h1>
        <p id="t-instruction" style="max-width: 300px; line-height: 1.5;"></p>
        <button id="t-start-btn" class="action-btn" onclick="startGame()"></button>
    </div>

    <!-- 3. PANTALLA DE DESBLOQUEO -->
    <div id="unlock-screen" class="overlay-screen">
        <h1 id="t-unlock-title" style="color: var(--neon-blue); margin: 0;"></h1>
        <div id="unlock-icon" class="unlock-anim">🔋</div>
        <h2 id="unlock-name" style="color: white; margin: 0;"></h2>
        <button id="t-install-btn" class="action-btn" onclick="closeUnlock()" style="background: var(--neon-blue);"></button>
    </div>

    <!-- 4. PANTALLA DE ERROR/REPARACIÓN -->
    <div id="error-screen">
        <h2 id="t-warn-title" style="font-size: 1.5rem; color: white;"></h2>
        <div id="correct-answer-display" style="font-size: 3rem; font-weight: 900; margin: 20px 0;"></div>
        <button id="t-continue-btn" class="action-btn" onclick="resumeGame()" style="background: white; color: red;"></button>
    </div>

    <!-- 5. PANTALLA DE FIN -->
    <div id="end-screen" class="overlay-screen" style="display: none;">
        <h1 id="t-gameover" style="color: var(--alert);"></h1>
        <div class="stat-box">
            <div id="t-final-rank-label"></div>
            <div id="final-rank">-</div>
            <hr style="border:0; border-top:1px solid #1e293b; margin:10px 0;">
            <div id="t-mods-label"></div>
            <div id="collection-end">
                <!-- Se llena por JS -->
            </div>
            <hr style="border:0; border-top:1px solid #1e293b; margin:10px 0;">
            <div id="t-score-label"></div>
            <div id="final-score">0</div>
        </div>
        <button id="t-retry-btn" class="action-btn" onclick="location.reload()"></button>
    </div>

    <!-- EL JUEGO -->
    <div id="game">
        <div id="hud">
            <span id="rank-display"></span>
            <span>HACKS: <span id="phase">00</span></span>
        </div>
        <div id="construction-area">
            <div id="house-display">🛰️</div>
        </div>
        <div id="timer-bar"><div id="timer-fill"></div></div>
        <div id="prob">? x ?</div>
        <div class="grid">
            <button class="btn" onclick="check(0)"></button>
            <button class="btn" onclick="check(1)"></button>
            <button class="btn" onclick="check(2)"></button>
        </div>
        <div id="error-dots" style="margin-top:15px; color:var(--alert); font-size:0.9rem; font-weight: bold;"></div>
    </div>

    <script>
        const i18n = {
            es: { 
                inst: "SABOTAJE: Toca el resultado INCORRECTO para corromper el sistema.", 
                start: "CONECTAR NODO", retry: "REINTENTAR", over: "CONEXIÓN PERDIDA", 
                rank: "RANGO FINAL", mods: "MÓDULOS", score: "HACKS", warn_t: "SISTEMA BLOQUEADO", 
                track: "RASTREO", ranks: ["NOVATO", "HACKER", "MAESTRO", "ARCHITECT"],
                unlock: "¡MÓDULO RECUPERADO!", install: "INSTALAR", cont: "REPARAR Y SEGUIR",
                itemNames: ["NÚCLEO ENERGÍA", "CÓDIGO ÍGNEO", "FIREWALL ALPHA", "RECEPTOR SAT", "IA CORTEX", "BOT DE ASALTO"]
            },
            en: { 
                inst: "SABOTAGE: Tap the INCORRECT result to corrupt the system.", 
                start: "CONNECT NODE", retry: "RETRY ACCESS", over: "CONNECTION LOST", 
                rank: "FINAL RANK", mods: "MODULES", score: "HACKS", warn_t: "SYSTEM LOCKED", 
                track: "TRACKING", ranks: ["NOVICE", "HACKER", "MASTER", "ARCHITECT"],
                unlock: "MODULE RECOVERED!", install: "INSTALL", cont: "REPAIR & CONTINUE",
                itemNames: ["ENERGY CORE", "FIRE CODE", "FIREWALL ALPHA", "SAT RECEIVER", "IA CORTEX", "ASSAULT BOT"]
            }
        };

        let currentLang = 'es';
        let score = 0, alertLevel = 0, timer, isChecking = false, currentN1, currentN2, res;
        const stages = ["🛰️", "📡", "🚀", "🛸", "👾", "☄️", "🌌", "👑"];
        const itemIcons = ["🔋", "🔥", "🛡️", "📡", "🧠", "🔫"];
        const collectThresholds = [10, 20, 30, 40, 50, 60];
        let unlockedItems = JSON.parse(localStorage.getItem('arch_items')) || [0,0,0,0,0,0];

        function setLang(l) {
            currentLang = l;
            const t = i18n[l];
            document.getElementById('t-instruction').innerText = t.inst;
            document.getElementById('t-start-btn').innerText = t.start;
            document.getElementById('t-retry-btn').innerText = t.retry;
            document.getElementById('t-gameover').innerText = t.over;
            document.getElementById('t-final-rank-label').innerText = t.rank;
            document.getElementById('t-mods-label').innerText = t.mods;
            document.getElementById('t-score-label').innerText = t.score;
            document.getElementById('t-warn-title').innerText = t.warn_t;
            document.getElementById('t-unlock-title').innerText = t.unlock;
            document.getElementById('t-install-btn').innerText = t.install;
            document.getElementById('t-continue-btn').innerText = t.cont;
            
            document.getElementById('lang-screen').style.display = 'none';
            document.getElementById('start-screen').style.display = 'flex';
        }

        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playSound(freq, type, duration, vol = 0.1) {
            try {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.type = type; osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
                gain.gain.setValueAtTime(vol, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
                osc.connect(gain); gain.connect(audioCtx.destination);
                osc.start(); osc.stop(audioCtx.currentTime + duration);
            } catch(e) {}
        }

        function startGame() {
            if (audioCtx.state === 'suspended') audioCtx.resume();
            document.getElementById('start-screen').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            updateAlertUI();
            gen();
        }

        function check(idx) {
            if(isChecking) return;
            isChecking = true;
            clearInterval(timer);
            let btns = document.querySelectorAll('.btn');
            
            if (idx !== -1 && parseInt(btns[idx].innerText) !== res) {
                score++;
                playSound(800 + (score * 10), 'square', 0.1);
                
                let itemIdx = collectThresholds.indexOf(score);
                if(itemIdx !== -1) {
                    showUnlock(itemIdx);
                } else {
                    btns[idx].classList.add('correct-sabotage');
                    document.getElementById('phase').innerText = score.toString().padStart(2, '0');
                    document.getElementById('house-display').innerText = stages[Math.min(Math.floor(score/8), stages.length-1)];
                    setTimeout(gen, 300);
                }
            } else {
                handleError();
            }
        }

        function showUnlock(idx) {
            unlockedItems[idx] = 1;
            localStorage.setItem('arch_items', JSON.stringify(unlockedItems));
            
            playSound(440, 'sine', 0.2, 0.2);
            setTimeout(() => playSound(554, 'sine', 0.2, 0.2), 150);
            setTimeout(() => playSound(659, 'sine', 0.4, 0.2), 300);

            document.getElementById('unlock-icon').innerText = itemIcons[idx];
            document.getElementById('unlock-name').innerText = i18n[currentLang].itemNames[idx];
            document.getElementById('unlock-screen').style.display = 'flex';
        }

        function closeUnlock() {
            document.getElementById('unlock-screen').style.display = 'none';
            document.getElementById('phase').innerText = score.toString().padStart(2, '0');
            gen();
        }

        function handleError() {
            alertLevel++;
            playSound(80, 'sawtooth', 0.6, 0.2);
            updateAlertUI();
            document.getElementById('correct-answer-display').innerText = `${currentN1} × ${currentN2} = ${res}`;
            document.getElementById('error-screen').style.display = 'flex';
            if (alertLevel >= 3) {
                document.getElementById('t-continue-btn').style.display = 'none';
                setTimeout(gameOver, 2000);
            }
        }

        function gen() {
            isChecking = false;
            document.getElementById('error-screen').style.display = 'none';
            updateRank();
            let maxRange = score < 10 ? 5 : 12;
            currentN1 = Math.floor(Math.random() * maxRange) + 1;
            currentN2 = Math.floor(Math.random() * 10) + 1;
            res = currentN1 * currentN2;
            document.getElementById('prob').innerText = `${currentN1} × ${currentN2}`;
            let btns = document.querySelectorAll('.btn');
            let realPos = Math.floor(Math.random() * 3);
            btns.forEach((b, i) => {
                b.disabled = false;
                b.classList.remove('correct-sabotage');
                if (i === realPos) b.innerText = res;
                else {
                    let fake = res + (Math.floor(Math.random() * 3) + 1) * (Math.random() > 0.5 ? 1 : -1);
                    if (fake <= 0 || fake === res) fake = res + 2;
                    b.innerText = fake;
                }
            });
            startTimer();
        }

        function startTimer() {
            let limit = Math.max(0.7, 5 - (score * 0.1)); 
            let current = 100;
            clearInterval(timer);
            timer = setInterval(() => {
                current -= (10 / limit);
                document.getElementById('timer-fill').style.width = current + "%";
                if(current <= 0) { clearInterval(timer); check(-1); }
            }, 100);
        }

        function updateRank() {
            const t = i18n[currentLang];
            let rankIdx = score >= 50 ? 3 : score >= 30 ? 2 : score >= 15 ? 1 : 0;
            const colors = ["#00ff41", "#00d4ff", "#ffea00", "#ff007f"];
            document.getElementById('rank-display').innerText = "NV." + (rankIdx+1) + " " + t.ranks[rankIdx];
            document.getElementById('rank-display').style.color = colors[rankIdx];
            document.documentElement.style.setProperty('--rank-color', colors[rankIdx]);
        }

        function updateAlertUI() {
            const t = i18n[currentLang];
            let dots = "";
            for(let i=0; i<3; i++) dots += i < alertLevel ? "● " : "○ ";
            document.getElementById('error-dots').innerText = t.track + ": " + dots;
        }

        function resumeGame() { if(alertLevel < 3) gen(); }

        function gameOver() {
            document.getElementById('error-screen').style.display = 'none';
            document.getElementById('game').style.display = 'none';
            document.getElementById('end-screen').style.display = 'flex';
            document.getElementById('final-score').innerText = score;
            document.getElementById('final-rank').innerText = document.getElementById('rank-display').innerText;
            
            const container = document.getElementById('collection-end');
            container.innerHTML = '';
            itemIcons.forEach((icon, i) => {
                const div = document.createElement('div');
                div.className = 'item' + (unlockedItems[i] ? ' unlocked' : '');
                div.innerText = icon;
                container.appendChild(div);
            });
        }

        const canvas = document.getElementById('code-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth; canvas.height = window.innerHeight;
        const drops = Array(Math.floor(canvas.width / 16)).fill(1);
        function drawMatrix() {
            ctx.fillStyle = "rgba(5, 10, 20, 0.15)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = "#00ff41"; ctx.font = "16px monospace";
            drops.forEach((y, i) => {
                ctx.fillText(Math.floor(Math.random()*2), i * 16, y * 16);
                if (y * 16 > canvas.height && Math.random() > 0.975) drops[i] = 0;
                drops[i]++;
            });
        }
        setInterval(drawMatrix, 50);
    </script>
</body>
</html>
